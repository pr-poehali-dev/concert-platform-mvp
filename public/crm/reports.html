<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>CRM — Отчёты</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="/crm/config.js"></script>
  <script src="/crm/utils.js"></script>
  <script src="/crm/components/chart.js"></script>
</head>
<body>
<div id="crm-app" class="pb-nav"></div>

<script>
const app = document.getElementById('crm-app');
let deals = [], tasks = [], companies = [];
let filterManager = '', filterStage = '', dateFrom = '', dateTo = '';
let chartInstances = [];
const managers = ['Иван Смирнов','Мария Волкова','Алексей Петров','Дмитрий Новиков','Светлана Козлова'];

async function init() {
  [deals, tasks, companies] = await Promise.all([api.get('deals'), api.get('tasks'), api.get('companies')]);
  render();
}

function getFilteredDeals() {
  let res = [...deals];
  if (filterManager) res = res.filter(d => d.assignee === filterManager);
  if (filterStage) res = res.filter(d => d.stage === filterStage);
  if (dateFrom) res = res.filter(d => new Date(d.createdAt) >= new Date(dateFrom));
  if (dateTo) res = res.filter(d => new Date(d.createdAt) <= new Date(dateTo));
  return res;
}

function render() {
  chartInstances.forEach(c => CrmChart.destroy(c));
  chartInstances = [];

  const filtered = getFilteredDeals();
  const won = filtered.filter(d => d.stage === 'won');
  const revenue = won.reduce((s,d) => s + d.amount, 0);
  const pipeline = filtered.filter(d => !['won','lost'].includes(d.stage)).reduce((s,d) => s + d.amount * d.probability / 100, 0);

  app.innerHTML = `
    <nav class="crm-nav">
      <button class="crm-nav-back" onclick="location.href='/crm/index.html'">←</button>
      <span class="crm-nav-title">Отчёты</span>
      <button class="btn btn-secondary btn-sm" onclick="exportReport()">↓ Экспорт</button>
    </nav>

    <div class="crm-page">
      <!-- Filters -->
      <div class="card" style="margin-bottom:16px;">
        <div class="section-title">Фильтры</div>
        <div class="grid-2">
          <div>
            <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px;">Менеджер</label>
            <select class="input" onchange="filterManager=this.value;render()">
              <option value="">Все менеджеры</option>
              ${managers.map(m => `<option value="${m}" ${filterManager===m?'selected':''}>${m}</option>`).join('')}
            </select>
          </div>
          <div>
            <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px;">Этап</label>
            <select class="input" onchange="filterStage=this.value;render()">
              <option value="">Все этапы</option>
              ${CRM_CONFIG.stages.map(s => `<option value="${s.id}" ${filterStage===s.id?'selected':''}>${s.label}</option>`).join('')}
            </select>
          </div>
          <div>
            <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px;">Дата от</label>
            <input class="input" type="date" value="${dateFrom}" onchange="dateFrom=this.value;render()">
          </div>
          <div>
            <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px;">Дата до</label>
            <input class="input" type="date" value="${dateTo}" onchange="dateTo=this.value;render()">
          </div>
        </div>
        ${(filterManager||filterStage||dateFrom||dateTo)?`
          <button class="btn btn-secondary btn-sm" style="margin-top:10px;" onclick="filterManager='';filterStage='';dateFrom='';dateTo='';render()">✕ Сбросить фильтры</button>
        `:''}
      </div>

      <!-- Summary -->
      <div class="grid-4" style="margin-bottom:16px;">
        <div class="kpi-card purple"><div class="kpi-label">Сделок в выборке</div><div class="kpi-value">${filtered.length}</div></div>
        <div class="kpi-card green"><div class="kpi-label">Выручка</div><div class="kpi-value" style="font-size:16px;">${fmt.money(revenue)}</div></div>
        <div class="kpi-card cyan"><div class="kpi-label">Pipeline</div><div class="kpi-value" style="font-size:16px;">${fmt.money(pipeline)}</div></div>
        <div class="kpi-card red"><div class="kpi-label">Конверсия</div><div class="kpi-value">${filtered.length?Math.round(won.length/filtered.length*100):0}%</div></div>
      </div>

      <!-- Charts -->
      <div class="card" style="margin-bottom:16px;">
        <div class="section-title">Сделки по этапам воронки</div>
        <div style="height:180px;"><canvas id="report-funnel"></canvas></div>
      </div>

      <div class="grid-2" style="margin-bottom:16px;">
        <div class="card">
          <div class="section-title">По менеджерам (выручка)</div>
          <div style="height:180px;"><canvas id="report-managers"></canvas></div>
        </div>
        <div class="card">
          <div class="section-title">Задачи: статусы</div>
          <div style="height:180px;"><canvas id="report-tasks"></canvas></div>
        </div>
      </div>

      <!-- Deals Table -->
      <div class="card" style="margin-bottom:16px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <div class="section-title" style="margin:0;">Сделки (${filtered.length})</div>
        </div>
        <div style="overflow-x:auto;">
          <table style="width:100%;border-collapse:collapse;font-size:13px;">
            <thead>
              <tr style="border-bottom:1px solid var(--border);">
                ${['Сделка','Компания','Сумма','Этап','Менеджер','Дата'].map(h=>`<th style="padding:8px 10px;text-align:left;font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap;">${h}</th>`).join('')}
              </tr>
            </thead>
            <tbody>
              ${filtered.slice(0,20).map(d => {
                const stage = CRM_CONFIG.stages.find(s => s.id === d.stage);
                return `<tr style="border-bottom:1px solid var(--border);">
                  <td style="padding:8px 10px;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${d.title}</td>
                  <td style="padding:8px 10px;color:var(--muted);">${d.companyName}</td>
                  <td style="padding:8px 10px;color:var(--primary);font-weight:600;white-space:nowrap;">${fmt.money(d.amount)}</td>
                  <td style="padding:8px 10px;"><span class="badge" style="background:${stage?.color}22;color:${stage?.color};">${stage?.label}</span></td>
                  <td style="padding:8px 10px;white-space:nowrap;">${d.assignee}</td>
                  <td style="padding:8px 10px;color:var(--muted);white-space:nowrap;">${fmt.date(d.createdAt)}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
          ${filtered.length > 20 ? `<div style="text-align:center;padding:12px;color:var(--muted);font-size:12px;">Показано 20 из ${filtered.length}. Экспортируй чтобы увидеть все.</div>` : ''}
        </div>
      </div>
    </div>

    <nav class="crm-bottom-nav">
      <a href="/crm/index.html"><span class="nav-icon">🏠</span>Главная</a>
      <a href="/crm/deals.html"><span class="nav-icon">💼</span>Сделки</a>
      <a href="/crm/companies.html"><span class="nav-icon">🏢</span>Компании</a>
      <a href="/crm/tasks.html"><span class="nav-icon">✅</span>Задачи</a>
      <a href="/crm/goals.html"><span class="nav-icon">🎯</span>Цели</a>
    </nav>
  `;

  // Funnel bar
  chartInstances.push(CrmChart.bar(
    document.getElementById('report-funnel').getContext('2d'),
    CRM_CONFIG.stages.map(s => s.label),
    [{
      label: 'Кол-во сделок',
      data: CRM_CONFIG.stages.map(s => filtered.filter(d => d.stage === s.id).length),
      backgroundColor: CRM_CONFIG.stages.map(s => s.color + 'cc'),
    }],
  ));

  // Managers bar
  const mRevenue = managers.map(m => filtered.filter(d=>d.assignee===m&&d.stage==='won').reduce((s,d)=>s+d.amount,0));
  chartInstances.push(CrmChart.bar(
    document.getElementById('report-managers').getContext('2d'),
    managers.map(m => m.split(' ')[0]),
    [{ label: 'Выручка', data: mRevenue, backgroundColor: 'rgba(168,85,247,0.8)' }],
    { yTicks: { callback: v => v/1000000 + 'M' } }
  ));

  // Tasks doughnut
  chartInstances.push(CrmChart.doughnut(
    document.getElementById('report-tasks').getContext('2d'),
    CRM_CONFIG.taskStatuses.map(s => s.label),
    CRM_CONFIG.taskStatuses.map(s => tasks.filter(t => t.status === s.id).length),
    CRM_CONFIG.taskStatuses.map(s => s.color),
  ));
}

function exportReport() {
  const data = {
    exportedAt: new Date().toISOString(),
    filters: { manager: filterManager, stage: filterStage, dateFrom, dateTo },
    deals: getFilteredDeals(),
    tasks,
    companies,
    summary: {
      totalDeals: getFilteredDeals().length,
      wonDeals: getFilteredDeals().filter(d=>d.stage==='won').length,
      revenue: getFilteredDeals().filter(d=>d.stage==='won').reduce((s,d)=>s+d.amount,0),
    },
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `crm-report-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast.success('Отчёт экспортирован');
  tg.HapticFeedback?.notificationOccurred('success');
}

init();
</script>
</body>
</html>
