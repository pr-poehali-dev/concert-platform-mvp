<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>CRM — Дашборд</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="/crm/config.js"></script>
  <script src="/crm/utils.js"></script>
  <script src="/crm/components/chart.js"></script>
</head>
<body>
<div id="crm-app" class="pb-nav"></div>

<script>
const app = document.getElementById('crm-app');
let chartInstances = [];

async function init() {
  app.innerHTML = `<div style="display:flex;justify-content:center;padding:48px;"><div class="spinner"></div></div>`;
  
  const [deals, tasks, companies, goals] = await Promise.all([
    api.get('deals'), api.get('tasks'), api.get('companies'), api.get('goals')
  ]);

  const revenue = deals.filter(d => d.stage === 'won').reduce((s, d) => s + d.amount, 0);
  const activePipeline = deals.filter(d => !['won','lost'].includes(d.stage)).reduce((s, d) => s + d.amount * (d.probability / 100), 0);
  const overdue = tasks.filter(t => t.status !== 'done' && new Date(t.deadline) < new Date()).length;
  const wonRate = deals.length ? Math.round(deals.filter(d => d.stage === 'won').length / deals.length * 100) : 0;

  const stageData = CRM_CONFIG.stages.map(s => ({
    label: s.label, value: deals.filter(d => d.stage === s.id).length, color: s.color
  }));

  const topDeals = [...deals].filter(d => !['won','lost'].includes(d.stage)).sort((a,b) => b.amount - a.amount).slice(0, 5);
  const recentTasks = [...tasks].filter(t => t.status !== 'done').sort((a,b) => new Date(a.deadline) - new Date(b.deadline)).slice(0, 5);

  app.innerHTML = `
    <nav class="crm-nav">
      <span class="crm-nav-title">🚀 CRM</span>
      <button class="btn btn-primary btn-sm" onclick="openQuickDeal()">+ Сделка</button>
    </nav>

    <div class="crm-page">
      <!-- KPI -->
      <div class="grid-4" style="margin-bottom:16px;">
        <div class="kpi-card purple">
          <div class="kpi-label">Выручка (закрыто)</div>
          <div class="kpi-value">${fmt.money(revenue)}</div>
          <div class="kpi-delta text-success">✓ ${deals.filter(d=>d.stage==='won').length} сделок</div>
        </div>
        <div class="kpi-card cyan">
          <div class="kpi-label">Pipeline (взвешен)</div>
          <div class="kpi-value">${fmt.money(activePipeline)}</div>
          <div class="kpi-delta text-muted">${deals.filter(d=>!['won','lost'].includes(d.stage)).length} активных</div>
        </div>
        <div class="kpi-card green">
          <div class="kpi-label">Конверсия</div>
          <div class="kpi-value">${wonRate}%</div>
          <div class="kpi-delta text-muted">${deals.length} всего сделок</div>
        </div>
        <div class="kpi-card red">
          <div class="kpi-label">Задачи просрочены</div>
          <div class="kpi-value">${overdue}</div>
          <div class="kpi-delta text-muted">${tasks.filter(t=>t.status!=='done').length} открытых</div>
        </div>
      </div>

      <!-- Funnel + Top Deals -->
      <div class="grid-2" style="margin-bottom:16px;">
        <div class="card">
          <div class="section-title">Воронка продаж</div>
          <div id="funnel-chart"></div>
        </div>
        <div class="card">
          <div class="section-title">Топ сделки</div>
          ${topDeals.map(d => {
            const stage = CRM_CONFIG.stages.find(s => s.id === d.stage);
            return `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="location.href='/crm/deals.html'">
              <div style="width:6px;height:36px;background:${stage?.color};border-radius:3px;flex-shrink:0;"></div>
              <div style="flex:1;min-width:0;">
                <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${d.title}</div>
                <div style="font-size:11px;color:var(--muted);">${d.companyName}</div>
              </div>
              <div style="text-align:right;flex-shrink:0;">
                <div style="font-size:13px;font-weight:600;color:var(--primary);">${fmt.money(d.amount)}</div>
                <div style="font-size:11px;color:var(--muted);">${d.probability}%</div>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- Revenue Chart -->
      <div class="card" style="margin-bottom:16px;">
        <div class="section-title">Продажи по месяцам</div>
        <div style="height:180px;"><canvas id="revenue-chart"></canvas></div>
      </div>

      <!-- Tasks + Goals -->
      <div class="grid-2" style="margin-bottom:16px;">
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <div class="section-title" style="margin:0;">Срочные задачи</div>
            <a href="/crm/tasks.html" style="font-size:12px;color:var(--primary);text-decoration:none;">Все →</a>
          </div>
          ${recentTasks.map(t => {
            const isOverdue = new Date(t.deadline) < new Date();
            const prio = CRM_CONFIG.priorities.find(p => p.id === t.priority);
            return `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="location.href='/crm/tasks.html'">
              <div style="width:8px;height:8px;border-radius:50%;background:${prio?.color};flex-shrink:0;"></div>
              <div style="flex:1;min-width:0;">
                <div style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.title}</div>
                <div style="font-size:11px;color:${isOverdue ? 'var(--danger)' : 'var(--muted)'};">${isOverdue ? '⚠ ' : ''}${fmt.relDate(t.deadline)}</div>
              </div>
              <div class="avatar" style="background:var(--card2);font-size:10px;">${fmt.initials(t.assignee)}</div>
            </div>`;
          }).join('')}
        </div>
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <div class="section-title" style="margin:0;">Цели</div>
            <a href="/crm/goals.html" style="font-size:12px;color:var(--primary);text-decoration:none;">Все →</a>
          </div>
          ${goals.slice(0,4).map(g => {
            const pct = Math.min(100, Math.round(g.current / g.target * 100));
            const color = pct >= 80 ? 'var(--success)' : pct >= 50 ? 'var(--primary)' : 'var(--warning)';
            return `
            <div style="margin-bottom:14px;cursor:pointer;" onclick="location.href='/crm/goals.html'">
              <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">
                <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;">${g.title}</span>
                <span style="color:${color};font-weight:600;">${pct}%</span>
              </div>
              <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color};"></div></div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- Quick Stats -->
      <div class="card" style="margin-bottom:16px;">
        <div class="section-title">Компании</div>
        <div style="display:flex;gap:24px;flex-wrap:wrap;">
          <div><div style="font-size:22px;font-weight:700;color:var(--primary);">${companies.filter(c=>c.status==='active').length}</div><div style="font-size:12px;color:var(--muted);">Активных</div></div>
          <div><div style="font-size:22px;font-weight:700;color:var(--accent);">${companies.filter(c=>c.status==='lead').length}</div><div style="font-size:12px;color:var(--muted);">Лидов</div></div>
          <div><div style="font-size:22px;font-weight:700;color:var(--muted);">${companies.filter(c=>c.status==='inactive').length}</div><div style="font-size:12px;color:var(--muted);">Неактивных</div></div>
          <div><div style="font-size:22px;font-weight:700;color:var(--text);">${companies.length}</div><div style="font-size:12px;color:var(--muted);">Всего</div></div>
        </div>
      </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="crm-bottom-nav">
      <a href="/crm/index.html" class="active"><span class="nav-icon">🏠</span>Главная</a>
      <a href="/crm/deals.html"><span class="nav-icon">💼</span>Сделки</a>
      <a href="/crm/companies.html"><span class="nav-icon">🏢</span>Компании</a>
      <a href="/crm/tasks.html"><span class="nav-icon">✅</span>Задачи</a>
      <a href="/crm/goals.html"><span class="nav-icon">🎯</span>Цели</a>
    </nav>
  `;

  // Render funnel
  CrmChart.funnel(document.getElementById('funnel-chart'), stageData);

  // Revenue chart (mock monthly data)
  const months = ['Янв','Фев','Мар','Апр','Май','Июн'];
  const monthRevenue = [8200000, 11500000, 9800000, 15300000, 13700000, revenue];
  chartInstances.push(CrmChart.line(
    document.getElementById('revenue-chart').getContext('2d'),
    months,
    [{
      label: 'Выручка',
      data: monthRevenue,
      borderColor: '#a855f7',
      backgroundColor: 'rgba(168,85,247,0.1)',
      pointBackgroundColor: '#a855f7',
    }]
  ));
}

function openQuickDeal() {
  location.href = '/crm/deals.html?new=1';
}

init();
</script>
</body>
</html>
