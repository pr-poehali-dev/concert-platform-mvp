<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>CRM — Аналитика</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="/crm/config.js"></script>
  <script src="/crm/utils.js"></script>
  <script src="/crm/components/chart.js"></script>
</head>
<body>
<div id="crm-app" class="pb-nav"></div>

<script>
const app = document.getElementById('crm-app');
let chartInstances = [];

async function init() {
  app.innerHTML = `<div style="display:flex;justify-content:center;padding:48px;"><div class="spinner"></div></div>`;
  const [deals, tasks, companies] = await Promise.all([api.get('deals'), api.get('tasks'), api.get('companies')]);
  render(deals, tasks, companies);
}

function render(deals, tasks, companies) {
  chartInstances.forEach(c => CrmChart.destroy(c));
  chartInstances = [];

  const wonDeals = deals.filter(d => d.stage === 'won');
  const lostDeals = deals.filter(d => d.stage === 'lost');
  const activeDeals = deals.filter(d => !['won','lost'].includes(d.stage));
  const totalRevenue = wonDeals.reduce((s,d) => s + d.amount, 0);

  const tasksByStatus = CRM_CONFIG.taskStatuses.map(s => ({
    label: s.label, value: tasks.filter(t => t.status === s.id).length, color: s.color,
  }));

  const managerStats = {};
  deals.forEach(d => {
    if (!d.assignee) return;
    if (!managerStats[d.assignee]) managerStats[d.assignee] = { won: 0, total: 0, revenue: 0 };
    managerStats[d.assignee].total++;
    if (d.stage === 'won') { managerStats[d.assignee].won++; managerStats[d.assignee].revenue += d.amount; }
  });
  const managers = Object.entries(managerStats).sort((a,b) => b[1].revenue - a[1].revenue);

  app.innerHTML = `
    <nav class="crm-nav">
      <button class="crm-nav-back" onclick="location.href='/crm/index.html'">←</button>
      <span class="crm-nav-title">Аналитика</span>
    </nav>

    <div class="crm-page">
      <!-- KPI Row -->
      <div class="grid-4" style="margin-bottom:16px;">
        <div class="kpi-card purple">
          <div class="kpi-label">Выручка</div>
          <div class="kpi-value" style="font-size:18px;">${fmt.money(totalRevenue)}</div>
          <div class="kpi-delta text-success">+12% к прошлому</div>
        </div>
        <div class="kpi-card cyan">
          <div class="kpi-label">Конверсия</div>
          <div class="kpi-value">${deals.length?Math.round(wonDeals.length/deals.length*100):0}%</div>
          <div class="kpi-delta text-muted">${wonDeals.length} выиграно</div>
        </div>
        <div class="kpi-card green">
          <div class="kpi-label">Сред. сделка</div>
          <div class="kpi-value" style="font-size:18px;">${wonDeals.length?fmt.money(totalRevenue/wonDeals.length):'—'}</div>
        </div>
        <div class="kpi-card red">
          <div class="kpi-label">Потеряно</div>
          <div class="kpi-value">${lostDeals.length}</div>
          <div class="kpi-delta text-muted">${fmt.money(lostDeals.reduce((s,d)=>s+d.amount,0))}</div>
        </div>
      </div>

      <!-- Sales Trend -->
      <div class="card" style="margin-bottom:16px;">
        <div class="section-title">Динамика продаж (6 месяцев)</div>
        <div style="height:200px;"><canvas id="trend-chart"></canvas></div>
      </div>

      <!-- Deal Stages + Task Status -->
      <div class="grid-2" style="margin-bottom:16px;">
        <div class="card">
          <div class="section-title">Сделки по этапам</div>
          <div style="height:180px;"><canvas id="stages-chart"></canvas></div>
        </div>
        <div class="card">
          <div class="section-title">Задачи по статусам</div>
          <div style="height:180px;"><canvas id="tasks-chart"></canvas></div>
        </div>
      </div>

      <!-- Managers Leaderboard -->
      <div class="card" style="margin-bottom:16px;">
        <div class="section-title">Рейтинг менеджеров</div>
        <div style="height:200px;"><canvas id="managers-chart"></canvas></div>
      </div>

      <!-- Manager Table -->
      <div class="card" style="margin-bottom:16px;">
        <div class="section-title">Детали по менеджерам</div>
        <div style="overflow-x:auto;">
          <table style="width:100%;border-collapse:collapse;">
            <thead>
              <tr style="border-bottom:1px solid var(--border);">
                <th style="padding:10px 12px;text-align:left;font-size:11px;color:var(--muted);font-weight:600;">Менеджер</th>
                <th style="padding:10px 12px;text-align:right;font-size:11px;color:var(--muted);font-weight:600;">Сделок</th>
                <th style="padding:10px 12px;text-align:right;font-size:11px;color:var(--muted);font-weight:600;">Выиграно</th>
                <th style="padding:10px 12px;text-align:right;font-size:11px;color:var(--muted);font-weight:600;">Конв.</th>
                <th style="padding:10px 12px;text-align:right;font-size:11px;color:var(--muted);font-weight:600;">Выручка</th>
              </tr>
            </thead>
            <tbody>
              ${managers.map(([name, s]) => `
                <tr style="border-bottom:1px solid var(--border);">
                  <td style="padding:10px 12px;">
                    <div style="display:flex;align-items:center;gap:8px;">
                      <div class="avatar" style="background:var(--primary)22;color:var(--primary);width:28px;height:28px;font-size:10px;">${fmt.initials(name)}</div>
                      ${name}
                    </div>
                  </td>
                  <td style="padding:10px 12px;text-align:right;">${s.total}</td>
                  <td style="padding:10px 12px;text-align:right;color:var(--success);">${s.won}</td>
                  <td style="padding:10px 12px;text-align:right;">${s.total?Math.round(s.won/s.total*100):0}%</td>
                  <td style="padding:10px 12px;text-align:right;color:var(--primary);font-weight:600;">${fmt.money(s.revenue)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <!-- Companies by industry -->
      <div class="card" style="margin-bottom:16px;">
        <div class="section-title">Компании по отраслям</div>
        <div style="height:180px;"><canvas id="industry-chart"></canvas></div>
      </div>
    </div>

    <nav class="crm-bottom-nav">
      <a href="/crm/index.html"><span class="nav-icon">🏠</span>Главная</a>
      <a href="/crm/deals.html"><span class="nav-icon">💼</span>Сделки</a>
      <a href="/crm/companies.html"><span class="nav-icon">🏢</span>Компании</a>
      <a href="/crm/tasks.html"><span class="nav-icon">✅</span>Задачи</a>
      <a href="/crm/goals.html"><span class="nav-icon">🎯</span>Цели</a>
    </nav>
  `;

  // Trend chart
  const months = ['Янв','Фев','Мар','Апр','Май','Июн'];
  chartInstances.push(CrmChart.bar(
    document.getElementById('trend-chart').getContext('2d'),
    months,
    [
      { label: 'Выручка', data: [8200000,11500000,9800000,15300000,13700000,totalRevenue], backgroundColor: 'rgba(168,85,247,0.8)' },
      { label: 'Pipeline', data: [12000000,14000000,11000000,18000000,16000000,activeDeals.reduce((s,d)=>s+d.amount*d.probability/100,0)], backgroundColor: 'rgba(34,211,238,0.6)' },
    ],
    { yTicks: { callback: v => fmt.money(v/1000000) + 'M' } }
  ));

  // Stages donut
  chartInstances.push(CrmChart.doughnut(
    document.getElementById('stages-chart').getContext('2d'),
    CRM_CONFIG.stages.map(s => s.label),
    CRM_CONFIG.stages.map(s => deals.filter(d => d.stage === s.id).length),
    CRM_CONFIG.stages.map(s => s.color),
  ));

  // Tasks donut
  chartInstances.push(CrmChart.doughnut(
    document.getElementById('tasks-chart').getContext('2d'),
    tasksByStatus.map(s => s.label),
    tasksByStatus.map(s => s.value),
    tasksByStatus.map(s => s.color),
  ));

  // Managers bar
  chartInstances.push(CrmChart.bar(
    document.getElementById('managers-chart').getContext('2d'),
    managers.map(([name]) => name.split(' ')[0]),
    [{
      label: 'Выручка',
      data: managers.map(([,s]) => s.revenue),
      backgroundColor: managers.map((_, i) => `hsl(${270 + i * 30},70%,60%)`),
    }],
    { yTicks: { callback: v => fmt.money(v/1000000) + 'M' } }
  ));

  // Industry pie
  const industryMap = {};
  companies.forEach(c => { industryMap[c.industry] = (industryMap[c.industry] || 0) + 1; });
  const industries = Object.entries(industryMap).sort((a,b) => b[1]-a[1]).slice(0,6);
  const iColors = ['#a855f7','#22d3ee','#4ade80','#f59e0b','#f43f5e','#6366f1'];
  chartInstances.push(CrmChart.doughnut(
    document.getElementById('industry-chart').getContext('2d'),
    industries.map(([k]) => k),
    industries.map(([,v]) => v),
    iColors,
  ));
}

init();
</script>
</body>
</html>
